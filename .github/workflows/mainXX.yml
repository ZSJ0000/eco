name: Build eco Jar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 拉取源码
      uses: actions/checkout@v4

    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 编译并打包
      run: |
        chmod +x gradlew
        ./gradlew clean build --no-daemon

    - name: 上传编译结果
      uses: actions/upload-artifact@v4
      with:
        name: eco-Build
        path: build/libs/*.jar
